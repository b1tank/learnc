<!-- Boot theme BEFORE paint — see index.html for the rationale. -->
<script>
  (function () {
    try {
      var pref = localStorage.getItem("learnc.theme");
      var dark = pref === "dark" || (pref !== "light" &&
        window.matchMedia("(prefers-color-scheme: dark)").matches);
      if (dark) document.documentElement.dataset.theme = "dark";
    } catch (e) { /* private mode — fall through */ }
  })();
</script>
<!--
  coi-serviceworker installs COOP/COEP response headers via a service worker
  so that SharedArrayBuffer is available (needed by the WASM C compiler).
  GitHub Pages cannot set these headers itself. First visit causes one auto-
  reload; after that it's cached.

  We override coepCredentialless to always return false. The library defaults
  to credentialless on Safari, but `COEP: credentialless` only shipped in
  iOS 17.4 — older iPhones see an unknown value, fall back to no COEP, and
  the page never becomes crossOriginIsolated. require-corp has worked since
  iOS 15.2 and is satisfied by our CDNs (jsdelivr sends CORP, esm.sh sends
  CORS, which counts under require-corp for module fetches).
-->
<script>window.coi = { coepCredentialless: function () { return false; } };</script>
<script src="coi-serviceworker.js?v=88396b4d"></script>
<link rel="stylesheet" href="style.css">
<!-- Open TLS to the CDNs early. If the visitor landed here directly (deep
     link, refresh) we still want the marked + CodeMirror fetches to start as
     soon as possible. -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://esm.sh" crossorigin>
<!-- `defer` lets the HTML parser finish before fetching/executing marked, so
     the title and prose container are in the DOM by the time module scripts
     start. Modules are implicitly deferred and run after this script, which
     means `window.marked` is ready when lesson.js evaluates. -->
<script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<!--
  Import map: pin every CodeMirror 6 submodule + its transitive deps so that
  all packages share the SAME @codemirror/state instance. Without this, multiple
  copies of @codemirror/state get loaded and instanceof checks fail with
  "Unrecognized extension value in extension set". The leading "*" on esm.sh
  URLs marks a package as "external", meaning its imports become bare specifiers
  that resolve back through this map.
-->
<script type="importmap">
{
  "imports": {
    "codemirror":                "https://esm.sh/*codemirror@6.0.1",
    "@codemirror/state":         "https://esm.sh/@codemirror/state@6.4.1",
    "@codemirror/view":          "https://esm.sh/*@codemirror/view@6.26.3",
    "@codemirror/language":      "https://esm.sh/*@codemirror/language@6.10.2",
    "@codemirror/commands":      "https://esm.sh/*@codemirror/commands@6.5.0",
    "@codemirror/search":        "https://esm.sh/*@codemirror/search@6.5.6",
    "@codemirror/autocomplete":  "https://esm.sh/*@codemirror/autocomplete@6.16.0",
    "@codemirror/lint":          "https://esm.sh/*@codemirror/lint@6.8.0",
    "@codemirror/lang-cpp":      "https://esm.sh/*@codemirror/lang-cpp@6.0.2",
    "@codemirror/theme-one-dark":"https://esm.sh/*@codemirror/theme-one-dark@6.1.2",
    "@lezer/common":             "https://esm.sh/@lezer/common@1.2.1",
    "@lezer/highlight":          "https://esm.sh/*@lezer/highlight@1.2.0",
    "@lezer/lr":                 "https://esm.sh/*@lezer/lr@1.4.0",
    "@lezer/cpp":                "https://esm.sh/*@lezer/cpp@1.1.2",
    "style-mod":                 "https://esm.sh/style-mod@4.1.2",
    "w3c-keyname":               "https://esm.sh/w3c-keyname@2.2.8",
    "crelt":                     "https://esm.sh/crelt@1.0.6"
  }
}

<script>
  // First-paint title hint. The index page caches a slug→title map in
  // localStorage when it loads the manifest; reading it here lets the real
  // title appear with the page itself, instead of after lesson.js parses the
  // manifest a few hundred ms later. Idempotent — lesson.js overwrites with
  // the same string once it runs. Misses (first-ever visit, deep link from
  // outside, private mode) fall through to the old "hidden until JS" path.
  (function () {
    try {
      var m = location.search.match(/[?&]id=([^&]+)/);
      if (!m) return;
      var id = decodeURIComponent(m[1]);
      var titles = JSON.parse(localStorage.getItem("learnc.titles") || "{}");
      var t = titles[id];
      if (!t) return;
      var h1 = document.getElementById("lesson-title");
      if (h1) {
        h1.textContent = t;
        h1.classList.remove("lesson-title-empty");
      }
      document.title = t + " \u00b7 learnc";
    } catch (e) { /* private mode / parse error — fall through */ }
  })();
</script>
