</script>

<script>
  // Inline boot script - runs synchronously during HTML parse so the
  // browser learns about the lesson's URL slug as early as possible.
  // Two jobs, both pure best-effort:
  //
  //   1. Preload the lesson markdown. We know the .md filename from
  //      ?id=<slug>, so we can inject a <link rel=preload as=fetch>
  //      immediately. The browser starts the .md fetch in parallel with
  //      HTML parse + lesson.js download, instead of waiting for
  //      lesson.js to execute its `await fetch(...)` call. On a slow
  //      connection this trims a full RTT off LCP.
  //
  //   2. Paint the lesson title. The index page caches a slug→title map
  //      in localStorage when it loads the manifest; reading it here
  //      lets the real title appear at first paint, instead of after
  //      lesson.js parses the manifest a few hundred ms later.
  //      Idempotent - lesson.js overwrites with the same string once it
  //      runs.
  //
  // Misses (no ?id, first-ever visit, private mode) just fall through;
  // the page still works, it just loses these micro-optimisations.
  (function () {
    var qs = location.search;
    var m = qs.match(/[?&]id=([^&]+)/);
    if (!m) return;
    var id;
    try { id = decodeURIComponent(m[1]); } catch (e) { return; }
    // Reject anything that doesn't look like a lesson slug. Defends
    // against ?id=../etc/passwd style probes that would otherwise be
    // pushed into a <link href> attribute.
    if (!/^[A-Za-z0-9_-]+$/.test(id)) return;

    // Course routing - defaults to "kr" so pre-multi-course URLs (just
    // ?id=...) still resolve. Every course's lessons live under
    // courses/<slug>/lessons/<id>.md.
    var courseMatch = qs.match(/[?&]course=([^&]+)/);
    var course = "kr";
    if (courseMatch) {
      try {
        var c = decodeURIComponent(courseMatch[1]);
        if (/^[a-z][a-z0-9-]{0,31}$/.test(c)) course = c;
      } catch (e) { /* keep default */ }
    }
    var mdPath = "courses/" + course + "/lessons/" + id + ".md";

    // 1. Start the markdown fetch immediately.
    //
    // We tried <link rel=preload as=fetch> but Chromium's credentials-mode
    // matching is fiddly for same-origin static files and the browser
    // refuses to reuse the bytes (logs a credentials-mismatch warning and
    // double-fetches). Skipping the preload and just calling fetch() from
    // this inline script has the same network effect with no matching
    // gymnastics: the request goes out during HTML parse, the response
    // lands while lesson.js is still downloading, and lesson.js awaits
    // window.__lessonMdPromise instead of issuing its own fetch.
    try {
      window.__lessonMdPromise = fetch(mdPath);
    } catch (e) { /* old browsers - lesson.js falls back to its own fetch */ }

    // 2. Paint title from cache. Title map is namespaced by course so two
    // courses with colliding slugs cannot show the wrong title.
    try {
      var cacheKey = course === "kr" ? "learnc.titles" : "learnc.titles." + course;
      var titles = JSON.parse(localStorage.getItem(cacheKey) || "{}");
      var t = titles[id];
      if (!t) return;
      var h1 = document.getElementById("lesson-title");
      if (h1) {
        h1.textContent = t;
        h1.classList.remove("lesson-title-empty");
      }
      document.title = t + " \u00b7 learnc";
    } catch (e) { /* private mode / parse error - fall through */ }
  })();
</script>
