<!--
  coi-serviceworker installs COOP/COEP response headers via a service worker
  so SharedArrayBuffer is available (needed by the WASM C compiler). GitHub
  Pages cannot set these headers itself. First visit causes one auto-reload;
  after that it's cached.

  Override coepCredentialless to always return false: the library defaults
  to credentialless on Safari, but `COEP: credentialless` only shipped in
  iOS 17.4 - older iPhones see an unknown value, fall back to no COEP, and
  the page never becomes crossOriginIsolated. require-corp has worked since
  iOS 15.2 and is satisfied by our CDNs.

  bin/stamp rewrites ?v=PLACEHOLDER to the current commit SHA on every build.
-->
<script>window.coi = { coepCredentialless: function () { return false; } };</script>
<script src="coi-serviceworker.js?v=PLACEHOLDER"></script>
